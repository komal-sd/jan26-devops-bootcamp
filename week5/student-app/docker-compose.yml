version: "3"

services:

  db:
    image: postgres:14
    container_name: postgres_db
    environment:
      POSTGRES_DB: studentportal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  web:
    build: .
    container_name: flask_app
    depends_on:
      - db
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_NAME: studentportal
      DB_USER: postgres
      DB_PASS: password